<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор за препис | Дочка Кючукова</title>
    <style>
        @font-face {
            font-family: 'PrintDashed';
            src: url('princd.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-blue: #0a192f;
            --accent-orange: #e65100;
            --line-solid: #555555; 
            --line-dashed: #aaaaaa; 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #e9ecef;
            display: flex;
        }

        .sidebar {
            width: 340px; background: white; height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 25px;
            box-sizing: border-box; overflow-y: auto; position: fixed;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        /*--- НОВО: Стилизиране на хедъра в панела за логото ---*/
        .sidebar-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-orange);
            padding-bottom: 10px;
        }

        .sidebar h2 { 
            color: var(--primary-blue); 
            font-size: 1.1rem; 
            margin: 0; 
            text-transform: uppercase;
        }
        
        /* Стил за създателя в менюто */
        .creator-tag {
            font-size: 0.85rem;
            color: #666;
            margin-top: 3px;
            font-style: italic;
        }

        /*--- НОВО: Стил за самото лого ---*/
        .sidebar-logo {
            max-width: 70px; /* Ограничава ширината */
            max-height: 70px; /* Ограничава височината */
            object-fit: contain; /* Запазва пропорциите */
            border-radius: 8px; /* Леко заоблени ъгли за стил */
            margin-left: 10px;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.85rem; }
        
        textarea, input[type="text"] {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px; box-sizing: border-box;
        }

        .align-control {
            background: #f0f8ff; padding: 15px; border-radius: 8px; border: 1px solid #4facfe; margin-bottom: 20px;
        }
        .align-control input[type="range"] { width: 100%; cursor: pointer; margin-bottom: 15px; }

        .btn-print {
            width: 100%; padding: 12px; color: white; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer;
            font-size: 16px; margin-top: auto;
            background-color: var(--primary-blue);
        }

        .workspace { margin-left: 340px; padding: 20px; flex-grow: 1; display: flex; justify-content: center; }
        
        .a4-sheet {
            width: 210mm; height: 297mm; background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 15mm;
            box-sizing: border-box; display: flex; flex-direction: column; position: relative;
        }

        .sheet-header { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid var(--primary-blue); 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
            font-size: 14px; 
            line-height: 1.6;
        }
        .header-left, .header-right { flex: 1; }
        .header-right { text-align: right; }
        .sheet-title { text-align: center; margin-bottom: 15px; font-size: 20px; font-weight: bold; color: #333; }

        .writing-zone {
            position: relative;
            height: 40px; 
            margin-bottom: 12px; 
            width: 100%;
        }

        .g-line { position: absolute; left: 0; right: 0; z-index: 1; }
        .line-top { top: 0; border-top: 1px solid var(--line-solid); }
        .line-mid { top: 20px; border-top: 1px dashed var(--line-dashed); }
        .line-bottom { top: 40px; border-top: 1px solid var(--line-solid); }

        .cursive-output {
            position: absolute;
            left: 5px; right: 5px;
            font-family: 'PrintDashed', sans-serif; 
            font-weight: normal; 
            z-index: 10;
            line-height: 40px; 
            white-space: nowrap; 
            color: #000000; 
            letter-spacing: 1px;
            margin: 0; padding: 0;
        }

        .punct {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #999; 
            font-weight: 300;
            opacity: 0.6;
            font-size: 0.8em;
        }

        .evaluation-footer { margin-top: auto; text-align: center; padding-top: 10px; position: relative; }
        .stars { font-size: 28px; color: #ddd; letter-spacing: 5px; margin-bottom: 5px;}
        
        .copyright-sheet {
            font-size: 10px;
            color: #aaa;
            text-align: right;
            position: absolute;
            right: 0;
            bottom: -5px;
        }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; }
            .sidebar { display: none !important; }
            .workspace { margin: 0; padding: 0; }
            .a4-sheet { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header-wrapper">
            <div>
                <h2>Генератор за препис</h2>
                <div class="creator-tag">Автор: Дочка Кючукова</div>
            </div>
            <img src="logo.png" alt="Лого" class="sidebar-logo">
        </div>
        
        <div class="control-group">
            <label>Училище:</label>
            <input type="text" id="schoolInput" placeholder="Име на училище..." oninput="updateHeader()">
        </div>

        <div class="control-group">
            <label>Учител:</label>
            <input type="text" id="teacherInput" placeholder="Твоето име..." oninput="updateHeader()">
        </div>

        <div class="control-group">
            <label>Текст за препис:</label>
            <textarea id="textInput" oninput="generateSheet()">Paste your English text here. The generator will automatically measure words and wrap them perfectly within the lines without manual editing.</textarea>
        </div>

        <div class="align-control">
            <label>📏 Размер на шрифта:</label>
            <input type="range" min="20" max="80" value="46" id="size-slider" oninput="generateSheet()">
            
            <label>↕️ Позиция (нагоре/надолу):</label>
            <input type="range" min="-50" max="50" value="-5" id="v-slider" oninput="updateVertical()">
        </div>

        <div class="control-group">
            <label>Заглавие на листа:</label>
            <input type="text" id="sheetTitle" value="Handwriting Practice" oninput="updateHeader()">
        </div>

        <button class="btn-print" onclick="window.print()">🖨️ Отпечатай листа</button>
    </div>

    <div class="workspace">
        <div class="a4-sheet" id="printArea">
            
            <div class="sheet-header">
                <div class="header-left">
                    School: <span id="displaySchool">______________________</span><br>
                    Teacher: <span id="displayTeacher">___________________</span>
                </div>
                <div class="header-right">
                    Name: _______________________<br>
                    Date: <span id="displayDate">___________</span>
                </div>
            </div>

            <h2 class="sheet-title" id="displayTitle">HANDWRITING PRACTICE</h2>

            <div id="writingLinesContainer"></div>

            <footer class="evaluation-footer">
                <div style="font-size: 11px; color: #888;">Self-evaluation:</div>
                <div class="stars">☆☆☆☆☆☆</div>
                <div class="copyright-sheet">създадено от Дочка Кючукова</div>
            </footer>
        </div>
    </div>

    <script>
        function updateHeader() {
            let sName = document.getElementById('schoolInput').value;
            let tName = document.getElementById('teacherInput').value;
            document.getElementById('displayTitle').textContent = document.getElementById('sheetTitle').value;
            document.getElementById('displaySchool').textContent = sName || "______________________";
            document.getElementById('displayTeacher').textContent = tName || "___________________";
        }

        function setAutoDate() {
            let today = new Date();
            document.getElementById('displayDate').textContent = today.toLocaleDateString('bg-BG');
        }

        function updateVertical() {
            let vOffset = document.getElementById('v-slider').value;
            document.querySelectorAll('.cursive-output').forEach(el => el.style.top = vOffset + 'px');
        }

        function generateSheet() {
            let rawText = document.getElementById('textInput').value;
            let fontSize = document.getElementById('size-slider').value;
            let vOffset = document.getElementById('v-slider').value;
            let maxLineWidth = 670; 

            let measureDiv = document.createElement('div');
            measureDiv.style.position = 'absolute';
            measureDiv.style.visibility = 'hidden';
            measureDiv.style.whiteSpace = 'nowrap';
            measureDiv.style.fontFamily = "'PrintDashed', sans-serif";
            measureDiv.style.fontSize = fontSize + 'px';
            measureDiv.style.letterSpacing = '1px';
            document.body.appendChild(measureDiv);

            let paragraphs = rawText.split('\n');
            let finalLines = [];

            for(let p of paragraphs) {
                if(p.trim() === '') { finalLines.push(''); continue; }
                let words = p.split(' ');
                let currentLine = "";
                for(let w of words) {
                    let testLine = currentLine + w + " ";
                    measureDiv.textContent = testLine;
                    if(measureDiv.offsetWidth > maxLineWidth && currentLine !== "") {
                        finalLines.push(currentLine.trim());
                        currentLine = w + " ";
                    } else { currentLine = testLine; }
                }
                if(currentLine.trim() !== "") finalLines.push(currentLine.trim());
            }
            document.body.removeChild(measureDiv);

            let container = document.getElementById('writingLinesContainer');
            let html = "";
            for(let i = 0; i < 15; i++) { 
                let currentLine = finalLines[i] || ""; 
                let formattedLine = currentLine.replace(/([,\.\!\?\:\;])/g, '<span class="punct">$1</span>');
                html += `
                    <div class="writing-zone">
                        <div class="g-line line-top"></div>
                        <div class="g-line line-mid"></div>
                        <div class="g-line line-bottom"></div>
                        <div class="cursive-output" style="font-size: ${fontSize}px; top: ${vOffset}px;">${formattedLine}</div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        window.onload = function() {
            setAutoDate();
            setTimeout(generateSheet, 100); 
        };
    </script>
</body>
</html>
